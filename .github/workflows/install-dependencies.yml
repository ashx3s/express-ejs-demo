name: Install, Audit & Test
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["22.x"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      # Check for known vulnerabilities before building or testing.
      # Fails the run on anything moderate or above so issues are
      # caught on every push rather than accumulating between update runs.
      - name: Audit Dependencies
        run: npm audit --audit-level=moderate

      - name: Build Project
        run: npm run build --if-present

      - name: Run Tests
        run: npm test --if-present
